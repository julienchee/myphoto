<!DOCTYPE html>
<html>
<body>

<h2>ArrayAddition</h2>

<p>return the string true if any combination of numbers in the array (excluding the largest number)</p>

<p id="test1"></p>
<p id="test2"></p>
<p id="test3"></p>
<p id="test4"></p>

<script>
let arr = [3,7,11,19,23,41];
let mx = Math.max.apply(Math, arr)    // 3
let items = [], vis = [], vis_temp = [];
let i, j;
for (i = 0; i < arr.length; i ++) if(arr[i] != mx) items.push(arr[i]);

items.sort(function(a, b) {
  return a - b;
});

for (i = 0; i <= mx; i ++) {
  vis.push(0);
    vis_temp.push(0);
}
vis[0] = 1;
for (i = 0; i < items.length; i ++) {
  for (j = 0; j <= mx; j ++) vis_temp[j] = vis[j];
  for (j = 0; j <= mx; j ++) if(vis[j]) {
      vis_temp[j + items[i]] = 1;
    }
    for (j = 0; j <= mx; j ++) vis[j] = vis_temp[j];
}
document.getElementById("test1").innerHTML =
"The value : " + vis[mx] == 1 ? "True" : "False" ;

</script>

</body>

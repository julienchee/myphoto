<!DOCTYPE html>
<html>
<body>

<h2>ArrayAddition</h2>

<p>return the string true if any combination of numbers in the array (excluding the largest number)</p>
<p>Wrong Result When the max value is sum of three rest numbers</p>

<p id="test1"></p>
<p id="test2"></p>
<p id="test3"></p>
<p id="test4"></p>

<script>
console.log(ArrayAddition([5,7,16,1,2]));

function ArrayAddition(arr) {
  arr.sort(function(a,b){return a - b});
  var maxNum = arr.pop();
  var totalValue = 0;
    
  for (var i = 0; i < arr.length; i++){
    totalValue += arr[i];
    for (var j = 0; j < arr.length; j++){
      if (i != j) {
        totalValue += arr[j];
        if (totalValue == maxNum) {
          return true;
        }
      }
    }
      
    for (var k = 0; k < arr.length; k++) {
      if (i != k) {
        totalValue -= arr[k];
        if (totalValue == maxNum) {
          return true;
        }
      }
    }

    totalValue = 0;
  }
    
  return false;
}
document.getElementById("test1").innerHTML =
"[4, 6, 23, 10, 1, 3]  return value is : " + ArrayAddition([4, 6, 23, 10, 1, 3] );
document.getElementById("test2").innerHTML =
"[5,7,16,1,2] return value is : " + ArrayAddition([5,7,16,1,2]);
document.getElementById("test3").innerHTML =
"[3,5,-1,8,12] return value is : " + ArrayAddition([3,5,-1,8,12]);
document.getElementById("test4").innerHTML =
"[3,7,11,19,23,41] return value is : " + ArrayAddition([3,7,11,19,23,41]);
</script>

</body>
</html>
